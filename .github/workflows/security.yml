name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly scan to catch newly disclosed vulnerabilities in unchanged dependencies.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/javascript p/typescript p/nextjs p/owasp-top-ten p/secrets
          generateSarif: '1'
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  dependency-audit:
    name: Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Fail on high/critical vulnerabilities
        run: npm audit --audit-level=high --omit=dev
