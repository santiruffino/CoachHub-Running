name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly scan to catch newly disclosed vulnerabilities in unchanged dependencies.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep
        # `semgrep scan` reports findings via SARIF (surfaced in the Security tab)
        # and does not fail the job on findings, so CI stays green while still
        # tracking issues. The previous semgrep-action@v1 image is deprecated and
        # crashed on rules with MEDIUM severity.
        run: >
          semgrep scan
          --config p/javascript
          --config p/typescript
          --config p/nextjs
          --config p/owasp-top-ten
          --config p/secrets
          --sarif --output=semgrep.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  dependency-audit:
    name: Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Fail on high/critical vulnerabilities
        run: npm audit --audit-level=high --omit=dev
